sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness
sonar.projectVersion=1.0

# Paths
sonar.sources=app.py
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python
sonar.python.version=3

# Exclusions (generated/irrelevant files)
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**,**/venv/**,**/.pytest_cache/**,**/*.db,**/*.sqlite,**/*.sqlite3

# Optional (enable later if you generate these reports in CI)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.python.xunit.reportPath=reports/pytest-junit.xml

